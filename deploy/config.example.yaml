# OKX HFT Grid Bot - Example Configuration
# Copy this file to config.yaml and adjust values for your deployment.
#
# NOTE: upper_price and lower_price are OMITTED from grid_configs because
# they will be calculated adaptively at startup based on 7-day historical data.
# If you want to override the adaptive range, set them explicitly.

symbols:
  - "DOGE-USDT"
  - "PEPE-USDT"
  - "WIF-USDT"

grid_configs:
  - symbol: "DOGE-USDT"
    grid_count: 10
    grid_type: 0  # 0 = ARITHMETIC, 1 = GEOMETRIC
    order_size: "100"
    max_position: "3000"
    fee_rate: "0.001"
    drift:
      enabled: true
      drift_threshold: "0.10"
      drift_step: 2
      cooldown_period: 30s
      max_drifts: 100
  - symbol: "PEPE-USDT"
    grid_count: 10
    grid_type: 0
    order_size: "100000"
    max_position: "5000000"
    fee_rate: "0.001"
    drift:
      enabled: true
      drift_threshold: "0.10"
      drift_step: 2
      cooldown_period: 30s
      max_drifts: 100
  - symbol: "WIF-USDT"
    grid_count: 10
    grid_type: 0
    order_size: "5"
    max_position: "200"
    fee_rate: "0.001"
    drift:
      enabled: true
      drift_threshold: "0.10"
      drift_step: 2
      cooldown_period: 30s
      max_drifts: 100

mean_reversion_configs:
  - symbol: "PEPE-USDT"
    lookback_period: 60
    entry_threshold: "2.0"
    exit_threshold: "0.5"
    ma_type: 1
    order_size: "500000"
    max_position: "5000000"
    cooldown_ms: 5000

# Risk management
risk_limits:
  max_position_per_symbol: "10000000"
  max_total_position: "50000000"
  max_daily_loss: "500.0"
  max_strategy_loss: "200.0"
  max_orders_per_second: 10
  max_open_orders: 100
  min_spread_bps: 5
  emergency_stop_loss: "1000.0"

# Monitoring
metrics_port: 9090

# Connection
websocket_url: "wss://ws.okx.com:8443/ws/v5/public"
rest_url: "https://www.okx.com"
reconcile_interval_sec: 60
persistence_path: "data/hft_state.db"
