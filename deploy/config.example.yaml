# OKX HFT Grid Bot - version-controlled Singapore production profile.
# This profile starts reconcile-only. Production trading requires a separately
# reviewed config revision containing all non-secret gate evidence identifiers.
# Adaptive upper/lower prices remain runtime calculations; the approved range
# below is one symmetric half-width on each side of the reference price.

deployment:
  location: "aws-ap-southeast-1-singapore"

execution_mode: "production"
trading_enabled: false

execution:
  td_mode: "cash"

private_ws:
  heartbeat_interval: 20s
  liveness_timeout: 45s
  reconnect_start_deadline: 5s

reconciliation:
  interval: 30s

rebalancer:
  interval: 30s
  max_jitter: 5s

ticker:
  max_age: 5s

adaptive_range:
  min_half_width: "0.015"
  max_half_width: "0.04"
  symmetric: true
  width_mode: "per_side_half_width"

production_gates:
  credential_rotation: ""
  least_privilege: ""
  singapore_ip_allowlist: ""
  human_trading_approval: ""

symbols:
  - "DOGE-USDT"
  - "WIF-USDT"

grid_configs:
  - symbol: "DOGE-USDT"
    grid_count: 10
    grid_type: 0
    order_size: "100"
    max_position: "3000"
    fee_rate: "0.001"
    drift:
      enabled: true
      drift_threshold: "0.10"
      drift_step: 2
      cooldown_period: 30s
      max_drifts: 100
  - symbol: "WIF-USDT"
    grid_count: 10
    grid_type: 0
    order_size: "5"
    max_position: "200"
    fee_rate: "0.001"
    drift:
      enabled: true
      drift_threshold: "0.10"
      drift_step: 2
      cooldown_period: 30s
      max_drifts: 100

# Mean reversion is deliberately excluded from this production profile.
mean_reversion_configs: []

risk_limits:
  max_position_per_symbol: "10000000"
  max_total_position: "50000000"
  max_daily_loss: "500.0"
  max_strategy_loss: "200.0"
  max_orders_per_second: 10
  max_open_orders: 100
  min_spread_bps: 5
  emergency_stop_loss: "1000.0"

metrics_port: 9090
websocket_url: "wss://ws.okx.com:8443/ws/v5/public"
rest_url: "https://www.okx.com"

# Transitional composition field consumed by the current command wiring. It is
# constrained to the same approved 30-second value by startup validation.
reconcile_interval_sec: 30
persistence_path: "/var/lib/okx-hft-grid/hft_state.db"
